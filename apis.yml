apis:
- name: AsyncAPI Specification
  description: >-
    The AsyncAPI Specification is an open-source machine-readable format for
    describing asynchronous APIs. It defines channels (the addressable
    message endpoints), operations (send/receive actions an application
    performs), messages (the payload schema), servers (the broker connection
    details), and bindings (protocol-specific details for Kafka, MQTT, AMQP,
    WebSocket, NATS, SNS, SQS, and others). Version 3.0 (December 2023)
    introduced a major restructuring separating operations from channels;
    version 3.1.0 (January 2026) added ROS 2 bindings.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.asyncapi.com/
  baseURL: https://www.asyncapi.com/
  tags:
  - Specification
  - Event-Driven Architecture
  - Linux Foundation
  properties:
